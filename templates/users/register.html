{% extends 'base.html' %}

{% block title %}注册 - MBTI-Research{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card fade-in" style="max-width: 480px;">
    <div class="auth-header">
      <div class="mb-3">
        <span style="font-size: 3rem;">✨</span>
      </div>
      <h1 class="auth-title text-gradient">创建账户</h1>
      <p class="auth-subtitle">注册新账户，开始您的 MBTI-Research 科研协作测评</p>
    </div>
    
    <form method="post" autocomplete="off">
      {% csrf_token %}
      
      <div class="mb-3">
        <label for="username" class="form-label">用户名</label>
        <input type="text" 
               class="form-control form-control-lg" 
               id="username" 
               name="username" 
               placeholder="用于登录与展示" 
               required 
               autofocus>
      </div>
      
      <div class="mb-3">
        <label for="email" class="form-label">邮箱</label>
        <input type="email" 
               class="form-control form-control-lg" 
               id="email" 
               name="email" 
               placeholder="用于找回密码与通知" 
               required>
      </div>
      
      <div class="mb-3">
        <label for="reg_password" class="form-label">密码</label>
        <div class="position-relative">
          <input type="password" 
                 class="form-control form-control-lg" 
                 id="reg_password" 
                 name="password" 
                 placeholder="不少于8位" 
                 required
                 style="padding-right: 48px;">
          <button type="button" 
                  class="toggle-visibility position-absolute end-0 top-50 translate-middle-y me-2" 
                  data-target="reg_password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      
      <div class="mb-4">
        <label for="reg_confirm_password" class="form-label">确认密码</label>
        <div class="position-relative">
          <input type="password" 
                 class="form-control form-control-lg" 
                 id="reg_confirm_password" 
                 name="confirm_password" 
                 placeholder="再次输入密码" 
                 required
                 style="padding-right: 48px;">
          <button type="button" 
                  class="toggle-visibility position-absolute end-0 top-50 translate-middle-y me-2" 
                  data-target="reg_confirm_password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill mb-3">
        创建账户
      </button>
      
      <div class="auth-footer">
        已有账号？<a href="{% url 'users:login' %}">立即登录</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
