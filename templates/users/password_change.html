{% extends 'base.html' %}

{% block title %}修改密码 - MBTI测试{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card fade-in">
    <div class="auth-header">
      <div class="mb-3">
        <span style="font-size: 3rem;">🔐</span>
      </div>
      <h1 class="auth-title text-gradient">修改密码</h1>
      <p class="auth-subtitle">请设置您的新密码</p>
    </div>
    
    <form method="post">
      {% csrf_token %}
      
      <div class="mb-3">
        <label for="change_password" class="form-label">新密码</label>
        <div class="position-relative">
          <input type="password" 
                 class="form-control form-control-lg" 
                 id="change_password" 
                 name="password" 
                 placeholder="请输入新密码（不少于8位）" 
                 required 
                 autofocus
                 style="padding-right: 48px;">
          <button type="button" 
                  class="toggle-visibility position-absolute end-0 top-50 translate-middle-y me-2" 
                  data-target="change_password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      
      <div class="mb-4">
        <label for="change_confirm_password" class="form-label">确认密码</label>
        <div class="position-relative">
          <input type="password" 
                 class="form-control form-control-lg" 
                 id="change_confirm_password" 
                 name="confirm_password" 
                 placeholder="再次输入新密码" 
                 required
                 style="padding-right: 48px;">
          <button type="button" 
                  class="toggle-visibility position-absolute end-0 top-50 translate-middle-y me-2" 
                  data-target="change_confirm_password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill mb-3">
        确认修改
      </button>
      
      <div class="auth-footer">
        <a href="{% url 'mbti:home' %}">← 返回首页</a>
      </div>
    </form>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function(){
  const EYE_ON = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';
  const EYE_OFF = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.77 21.77 0 0 1 5.06-6.14M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.77 21.77 0 0 1-3.17 4.49"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
  
  document.querySelectorAll('button.toggle-visibility[data-target]').forEach(function(btn){
    btn.addEventListener('click', function(){
      const id = btn.getAttribute('data-target');
      const input = document.getElementById(id);
      if (!input) return;
      const isPwd = input.type === 'password';
      input.type = isPwd ? 'text' : 'password';
      btn.innerHTML = isPwd ? EYE_OFF : EYE_ON;
    });
  });
});
</script>
{% endblock %}
