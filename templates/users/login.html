{% extends 'base.html' %}

{% block title %}登录 - MBTI-Research{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card fade-in">
    <div class="auth-header">
      <div class="mb-3">
        <span style="font-size: 3rem;">✨</span>
      </div>
      <h1 class="auth-title text-gradient">欢迎回来</h1>
      <p class="auth-subtitle">登录您的账户，继续了解科研协作画像</p>
    </div>
    
    <form method="post" autocomplete="off">
      {% csrf_token %}
      
      <div class="mb-3">
        <label for="username" class="form-label">用户名</label>
        <input type="text" 
               class="form-control form-control-lg" 
               id="username" 
               name="username" 
               placeholder="请输入用户名" 
               required 
               autofocus>
      </div>
      
      <div class="mb-4">
        <label for="login_password" class="form-label">密码</label>
        <div class="position-relative">
          <input type="password" 
                 class="form-control form-control-lg" 
                 id="login_password" 
                 name="password" 
                 placeholder="请输入密码" 
                 required
                 style="padding-right: 48px;">
          <button type="button" 
                  class="toggle-visibility position-absolute end-0 top-50 translate-middle-y me-2" 
                  data-target="login_password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill mb-3">
        登录
      </button>
      
      <div class="auth-footer">
        没有账号？<a href="{% url 'users:register' %}">立即注册</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
