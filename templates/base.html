<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#667eea" />
  <meta name="description" content="专业的MBTI性格测试系统，3-5分钟获得详细的性格分析报告" />
  <title>{% block title %}MBTI人格测试{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'mbti:home' %}" style="color: #667eea; font-size: 1.5rem;">
        MBTI Test
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'mbti:home' %}">主页</a>
          </li>
          <li class="nav-item d-none d-md-block">
            <a class="nav-link" href="{% url 'mbti:home' %}#types">性格类型</a>
          </li>
          {% if user.is_authenticated %}
            <li class="nav-item d-none d-md-block">
              <a class="nav-link" href="{% url 'users:password_change' %}">修改密码</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'users:logout' %}">退出</a>
            </li>
          {% else %}
            <li class="nav-item d-none d-md-block">
              <a class="nav-link" href="{% url 'users:register' %}">注册</a>
            </li>
            <li class="nav-item">
              <a class="nav-link btn btn-primary text-white px-3 py-1 rounded-pill ms-2" href="{% url 'users:login' %}" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none;">
                登录
              </a>
            </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <!-- 消息提示 -->
  <main class="container-fluid px-0">
    <div class="container mt-3">
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      {% endfor %}
    </div>
    
    {% block content %}{% endblock %}
  </main>

  <!-- 页脚 -->
  <footer class="footer mt-5 py-4 bg-light border-top">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-4 text-center text-md-start mb-3 mb-md-0">
          <div class="fw-bold text-primary mb-2">MBTI Test</div>
          <small class="text-muted">专业的性格测试系统</small>
        </div>
        <div class="col-md-4 text-center mb-3 mb-md-0">
          <div class="footer-links">
            <a href="#" class="text-muted text-decoration-none me-3">隐私政策</a>
            <a href="#" class="text-muted text-decoration-none me-3">使用条款</a>
            <a href="#" class="text-muted text-decoration-none">联系我们</a>
          </div>
        </div>
        <div class="col-md-4 text-center text-md-end">
          <small class="text-muted">© 2025 MBTI Test. All rights reserved.</small>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
